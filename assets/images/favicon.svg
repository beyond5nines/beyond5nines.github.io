<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  </style>
  <rect width="32" height="32" rx="6" fill="#0a0a0b"/>
  <text x="10" y="22" font-family="Menlo, Monaco, Consolas, monospace" font-size="14" font-weight="bold" fill="#00FF00">9</text>
  <text x="20" y="22" font-family="Menlo, Monaco, Consolas, monospace" font-size="14" font-weight="bold" fill="#00FF00" class="blink">_</text>
</svg>