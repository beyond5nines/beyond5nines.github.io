# Site settings
title: beyond5nines
description: "Field notes for engineers who build and run production systems. Each post starts with a real incident and works through to the fix."
author: Rahul Sharma
url: "https://beyond5nines.com"
baseurl: ""

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jekyll-sitemap

# Google Search Console verification
# google_site_verification: PASTE_YOUR_CODE_HERE

# Excerpt settings
excerpt_separator: <!--more-->

# Permalink structure
permalink: /:title/

# Collections
collections:
  articles:
    output: true
    permalink: /:title/
    sort_by: date

# Feed
feed:
  collections:
    - articles

# Defaults
defaults:
  - scope:
      path: ""
      type: articles
    values:
      layout: post

# Contact
email: beyond5nines@gmail.com
linkedin_url: https://www.linkedin.com/in/rahul-nyc/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
