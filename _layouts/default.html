<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .blink {
      animation: blink 1s step-end infinite;
      color: #e4e4e7;
      display: inline-block;
    }
  </style>
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo">
        <span class="logo-text">beyond5nines<span class="blink">_</span></span>
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="https://www.linkedin.com/in/rahul-nyc/" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <span class="logo-text">beyond5nines<span class="blink">_</span></span>
          <p>Engineering insights beyond the standard.</p>
        </div>
        <div class="footer-links">
          <a href="https://www.linkedin.com/in/rahul-nyc/" target="_blank" rel="noopener">LinkedIn</a>
          <a href="mailto:beyond5nines@gmail.com">beyond5nines@gmail.com</a>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
