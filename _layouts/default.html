<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% if site.google_site_verification %}
  <meta name="google-site-verification" content="{{ site.google_site_verification }}" />
  {% endif %}
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}?v=4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v=5">
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .blink {
      animation: blink 1s step-end infinite;
      color: #e8eaed;
    }
  </style>
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo">
        <span class="logo-text">beyond<span class="highlight">5</span>nines<span class="blink">_</span></span>
      </a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>home</a>
        <a href="https://www.linkedin.com/in/rahul-nyc/" target="_blank" rel="noopener">linkedin</a>
        <a href="https://github.com/beyond5nines" target="_blank" rel="noopener">github</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <span class="logo-text">beyond<span class="highlight">5</span>nines</span>
          &nbsp;&middot;&nbsp; © {{ 'now' | date: "%Y" }} {{ site.title }}
        </div>
        <div class="footer-links">
          <a href="https://github.com/beyond5nines" target="_blank" rel="noopener">github</a>
          <a href="https://www.linkedin.com/in/rahul-nyc/" target="_blank" rel="noopener">linkedin</a>
          <a href="mailto:beyond5nines@gmail.com">email</a>
        </div>
      </div>
    </div>
  </footer>
  <script>
    (function() {
      const on = '{{ "/assets/images/favicon-on.svg" | relative_url }}';
      const off = '{{ "/assets/images/favicon-off.svg" | relative_url }}';
      const link = document.querySelector('link[rel="icon"]');
      let state = true;
      setInterval(function() {
        state = !state;
        link.href = state ? on : off;
      }, 500);
    })();
  </script>
</body>
</html>
